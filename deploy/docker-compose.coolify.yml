services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-looksphishy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-looksphishy}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=${CORS_ORIGIN}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - URLSCAN_API_KEY=${URLSCAN_API_KEY:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-looksphishy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-looksphishy}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-looksphishy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
