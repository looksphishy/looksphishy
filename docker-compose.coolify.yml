services:
  db-migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: build
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-looksphishy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-looksphishy}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "--filter", "@looksphishy/api", "db:push"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-looksphishy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-looksphishy}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=${CORS_ORIGIN}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-looksphishy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-looksphishy}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-looksphishy}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
